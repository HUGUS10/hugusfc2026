<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | HUGUS FC</title>
  <meta name="theme-color" content="#0a0f0a">
  <link rel="icon" href="/imag/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <nav class="solid" id="mainNav"><div class="nav-i"><a href="index.html" class="nav-brand"><div class="nav-brand-logo"><img src="/imag/logo.png" alt="H" onerror="this.outerHTML='<span style=\'font-family:Bebas Neue;font-size:1.1rem;color:#C9A227\'>H</span>'"></div><div class="nav-brand-text">HUGUS FC</div></a><div class="nav-right"><a href="index.html" class="btn-nav-acceder"><i class="fas fa-arrow-left"></i> Inicio</a></div></div></nav>
  <div class="page-wrap">
    <div class="page-hero"><div class="breadcrumb"><a href="index.html">Inicio</a> / Contacto</div><h2 class="stit">CONT&Aacute;CTO</h2></div>
    <div class="si">
      <div class="contact-grid">
        <div class="contact-info">
          <div class="contact-item"><i class="fas fa-map-marker-alt"></i><div><div class="contact-item-label">Ubicaci&oacute;n</div><div class="contact-item-val">Campo HUGUS<br>Hermosillo, Sonora, M&eacute;xico</div></div></div>
          <div class="contact-item"><i class="fas fa-envelope"></i><div><div class="contact-item-label">Correo</div><div class="contact-item-val">contacto@hugusfc.com</div></div></div>
          <div class="contact-item"><i class="fab fa-whatsapp"></i><div><div class="contact-item-label">WhatsApp</div><div class="contact-item-val">+52 662 XXX XXXX</div></div></div>
          <div class="contact-item"><i class="fab fa-instagram"></i><div><div class="contact-item-label">Instagram</div><div class="contact-item-val">@hugusfc</div></div></div>
          <div class="contact-item"><i class="fab fa-facebook-f"></i><div><div class="contact-item-label">Facebook</div><div class="contact-item-val">/HUGUSFC</div></div></div>
        </div>
        <div class="contact-form">
          <h3 style="font-family:var(--font-display);font-size:1.6rem;color:var(--white);margin-bottom:20px;display:flex;align-items:center;gap:12px">Env&iacute;anos un mensaje<span style="flex:1;height:1px;background:rgba(201,162,39,.15)"></span></h3>
          <form onsubmit="enviarContacto(event)">
            <div class="form-group"><label class="form-label">Nombre</label><input class="form-input" id="contactNombre" placeholder="Tu nombre" required></div>
            <div class="form-group"><label class="form-label">Correo</label><input class="form-input" type="email" id="contactEmail" placeholder="tu@correo.com" required></div>
            <div class="form-group"><label class="form-label">Asunto</label><input class="form-input" id="contactAsunto" placeholder="Asunto del mensaje"></div>
            <div class="form-group"><label class="form-label">Mensaje</label><textarea class="form-input" id="contactMensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea></div>
            <button type="submit" class="btn-p" style="width:100%"><i class="fas fa-paper-plane"></i> Enviar Mensaje</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <footer><div class="footer-inner"><div class="footer-bottom"><div class="footer-copy">&copy; 2025 <span>HUGUS FC</span></div><div class="footer-copy">Dios &middot; Familia &middot; F&uacute;tbol</div></div></div></footer>
  <script src="js/app.js"></script>
  <script>
    async function enviarContacto(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span> Enviando...';
      try {
        await api('/api/contacto', { method:'POST', body:JSON.stringify({
          nombre: document.getElementById('contactNombre').value.trim(),
          email: document.getElementById('contactEmail').value.trim(),
          asunto: document.getElementById('contactAsunto').value.trim(),
          mensaje: document.getElementById('contactMensaje').value.trim()
        })});
        showToast('success', 'Mensaje enviado correctamente');
        e.target.reset();
      } catch(e) { showToast('error', e.message); }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Mensaje'; }
    }
  </script>
</body>
</html>
