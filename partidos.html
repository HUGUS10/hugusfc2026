<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario | HUGUS FC</title>
  <meta name="theme-color" content="#0a0f0a">
  <link rel="icon" href="/imag/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <nav class="solid" id="mainNav"><div class="nav-i"><a href="index.html" class="nav-brand"><div class="nav-brand-logo"><img src="/imag/logo.png" alt="H" onerror="this.outerHTML='<span style=\'font-family:Bebas Neue;font-size:1.1rem;color:#C9A227\'>H</span>'"></div><div class="nav-brand-text">HUGUS FC</div></a><div class="nav-right"><a href="index.html" class="btn-nav-acceder"><i class="fas fa-arrow-left"></i> Inicio</a></div></div></nav>
  <div class="page-wrap">
    <div class="page-hero"><div class="breadcrumb"><a href="index.html">Inicio</a> / Calendario</div><h2 class="stit">CALENDARIO <span class="g">2025</span></h2></div>
    <div class="si">
      <div class="calendar-head"><span class="next-label">Pr&oacute;ximo encuentro en:</span>
        <div class="countdown" id="countdown"><div class="cd-unit"><div class="cd-num" id="cdDays">00</div><div class="cd-label">D&iacute;as</div></div><div class="cd-sep">:</div><div class="cd-unit"><div class="cd-num" id="cdHours">00</div><div class="cd-label">Horas</div></div><div class="cd-sep">:</div><div class="cd-unit"><div class="cd-num" id="cdMins">00</div><div class="cd-label">Min</div></div><div class="cd-sep">:</div><div class="cd-unit"><div class="cd-num" id="cdSecs">00</div><div class="cd-label">Seg</div></div></div>
      </div>
      <div class="calendar-grid" style="grid-template-columns:1fr">
        <div class="match-card reveal" id="mainMatchCard"></div>
      </div>
      <div style="margin-top:48px"><div class="stit" style="margin-bottom:8px">TODOS LOS <span class="g">PARTIDOS</span></div><div id="allMatches" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:24px"></div></div>
    </div>
  </div>
  <footer><div class="footer-inner"><div class="footer-bottom"><div class="footer-copy">&copy; 2025 <span>HUGUS FC</span></div><div class="footer-copy">Dios &middot; Familia &middot; F&uacute;tbol</div></div></div></footer>
  <script src="js/app.js"></script>
  <script src="js/partidos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPartidos();
      // Render todos los partidos en lista
      const partidos = await api('/api/partidos');
      const allEl = document.getElementById('allMatches');
      allEl.innerHTML = partidos.map(p => {
        const d = new Date(p.fecha);
        const esFuturo = !p.resultado && d > new Date();
        return `<div class="mini-match" style="padding:20px">
          <div class="mini-date">${d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'})} · ${d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="mini-teams" style="font-size:.9rem"><span class="t home">HUGUS</span><span class="mini-vs">${p.resultado||'VS'}</span><span class="t away">${p.rival.toUpperCase()}</span></div>
          <div style="margin-top:8px;font-size:.7rem;color:${esFuturo?'var(--gold)':'var(--grey)'}">${p.competencia}${p.resultado?' · '+p.resultado:''}</div>
        </div>`;
      }).join('');
    });
  </script>
</body>
</html>
